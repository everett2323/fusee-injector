<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch RCM Payload Injector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(22, 28, 45, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --status-danger: #ef4444;
            --status-success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0b0f19 100%);
        }

        .container {
            width: 100%;
            max-width: 540px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .status-panel {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--status-danger);
            box-shadow: 0 0 10px var(--status-danger);
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background-color: var(--status-success);
            box-shadow: 0 0 10px var(--status-success);
        }

        .status-text {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .status-text span {
            color: var(--text-main);
            font-weight: 600;
        }

        .file-zone {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s ease, background-color 0.2s ease;
            margin-bottom: 24px;
            position: relative;
        }

        .file-zone:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.04);
        }

        .file-zone input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-zone-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            color: var(--text-muted);
        }

        .file-zone-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .file-zone-text span {
            color: var(--accent-blue);
            font-weight: 500;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.2);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .console-log {
            margin-top: 24px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            height: 120px;
            overflow-y: auto;
            color: #a7f3d0;
            white-space: pre-wrap;
        }

        /* Custom Scrollbar */
        .console-log::-webkit-scrollbar {
            width: 6px;
        }
        .console-log::-webkit-scrollbar-track {
            background: transparent;
        }
        .console-log::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Fusee Web Injector</h1>
            <p>Connect your Switch in RCM mode to begin</p>
        </header>

        <div class="status-panel">
            <div class="status-info">
                <div id="statusDot" class="status-dot"></div>
                <div class="status-text">Status: <span id="statusLabel">Disconnected</span></div>
            </div>
        </div>

        <div class="file-zone">
            <div class="file-zone-icon">📁</div>
            <div id="fileZoneText" class="file-zone-text"><span>Click to browse</span> or drag `.bin` payload here</div>
            <input type="file" id="payloadFile" accept=".bin">
        </div>

        <button id="actionBtn" class="btn">Connect Device</button>

        <div id="logger" class="console-log">[System] Ready. Please select a custom payload...</div>
    </div>

    <script>
        // Nintendo Switch APX USB IDs
        const RCM_VENDOR_ID = 0x057E; 
        const RCM_PRODUCT_ID = 0x3000;

        let usbDevice = null;
        let payloadArrayBuffer = null;

        const el = {
            statusDot: document.getElementById('statusDot'),
            statusLabel: document.getElementById('statusLabel'),
            fileZoneText: document.getElementById('fileZoneText'),
            payloadInput: document.getElementById('payloadFile'),
            actionBtn: document.getElementById('actionBtn'),
            logger: document.getElementById('logger')
        };

        function log(text) {
            el.logger.innerText += `\n[Log] ${text}`;
            el.logger.scrollTop = el.logger.scrollHeight;
        }

        // Handle File Selection
        el.payloadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                payloadArrayBuffer = event.target.result;
                el.fileZoneText.innerHTML = `Loaded: <strong>${file.name}</strong> (${file.size} bytes)`;
                log(`Loaded payload: ${file.name}`);
                updateUIState();
            };
            reader.readAsArrayBuffer(file);
        });

        function updateUIState() {
            if (!usbDevice) {
                el.statusDot.className = 'status-dot';
                el.statusLabel.innerText = 'Disconnected';
                el.actionBtn.innerText = 'Connect Device';
                el.actionBtn.disabled = false;
            } else {
                el.statusDot.className = 'status-dot connected';
                el.statusLabel.innerText = 'Switch (RCM) Detected';
                
                if (payloadArrayBuffer) {
                    el.actionBtn.innerText = 'Inject Payload';
                    el.actionBtn.disabled = false;
                } else {
                    el.actionBtn.innerText = 'Select Payload to Inject';
                    el.actionBtn.disabled = true;
                }
            }
        }

        // Action Button Logic (Connect or Inject)
        el.actionBtn.addEventListener('click', async () => {
            if (!usbDevice) {
                try {
                    usbDevice = await navigator.usb.requestDevice({
                        filters: [{ vendorId: RCM_VENDOR_ID, productId: RCM_PRODUCT_ID }]
                    });
                    log("USB device selected.");
                    updateUIState();
                } catch (err) {
                    log("Connection failed: " + err.message);
                }
            } else if (payloadArrayBuffer) {
                injectPayload();
            }
        });

        // The actual RCM / ShofEL2 Injection Routine
        async function injectPayload() {
            if (!usbDevice || !payloadArrayBuffer) return;

            el.actionBtn.disabled = true;
            el.actionBtn.innerText = 'Injecting...';

            try {
                log("Opening USB connection...");
                await usbDevice.open();
                
                log("Setting configuration...");
                await usbDevice.selectConfiguration(1);
                await usbDevice.claimInterface(0);

                log("Reading device hardware info...");
                // Standard RCM queries send 16 bytes containing chip ID
                let result = await usbDevice.transferIn(1, 16);
                log("Connected to hardware revision: " + new Uint8Array(result.data.buffer).subarray(0,4).join('.'));

                // Construct interleave payload geometry 
                // Interleave size targets standard Tegra X1 bootROM buffer exploit sizing
                let payload = new Uint8Array(0x30000); 
                let sourceView = new Uint8Array(payloadArrayBuffer);
                
                // Copy the actual payload to the front of the exploit construction zone
                payload.set(sourceView, 0);

                log("Interleaving geometry mapping...");
                // Setting up structural overlapping layout to smash the stack reliably
                for (let i = 0x3C00; i < 0x4000; i += 4) {
                    payload[i]     = 0x00;
                    payload[i + 1] = 0xE0;
                    payload[i + 2] = 0x01;
                    payload[i + 3] = 0x40;
                }

                log("Sending payload payload block...");
                await usbDevice.transferOut(1, payload);

                log("Triggering smash vulnerability via buffer request...");
                // Triggering a high request length to trigger memory overflow smash
                await usbDevice.controlTransferIn({
                    requestType: 'vendor',
                    recipient: 'interface',
                    request: 0x00,
                    value: 0x00,
                    index: 0x00
                }, 0x7000);

                log("Injection finished! Your Switch should now boot.");
            } catch (err) {
                log("Error during injection: " + err.message);
            } finally {
                // Reset states safely
                try { await usbDevice.close(); } catch(e){}
                usbDevice = null;
                updateUIState();
            }
        }

        // Keep track if device disconnects unexpectedly
        navigator.usb.addEventListener('disconnect', (event) => {
            if (usbDevice && event.device === usbDevice) {
                usbDevice = null;
                log("Device disconnected.");
                updateUIState();
            }
        });
    </script>
</body>
</html>
